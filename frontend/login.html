<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postino — Entrar</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="/app/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Postino" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <h1>Postino</h1>
        <p>Área do parceiro</p>
      </div>

      <div id="alert" class="alert"></div>

      <!-- Passo 1: E-mail -->
      <div id="step-email" class="auth-step active">
        <h2>Bem-vindo!</h2>
        <p>Informe seu e-mail para receber o código de acesso.</p>
        <p style="font-size:13px;color:#9ca3af;margin-top:8px;">Caso ainda não tenha sido cadastrado, solicite ao gestor do Postino no seu local.</p>

        <form id="form-email">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email" />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-email">Enviar código</button>
        </form>
      </div>

      <!-- Passo 2: OTP -->
      <div id="step-otp" class="auth-step">
        <h2>Código enviado</h2>
        <p id="otp-hint">Digite o código de 6 dígitos enviado para o seu e-mail.</p>

        <form id="form-otp">
          <div class="form-group">
            <label for="otp">Código</label>
            <input
              type="text"
              id="otp"
              class="otp-input"
              placeholder="000000"
              maxlength="6"
              inputmode="numeric"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary" id="btn-otp">Entrar</button>
          <button type="button" class="btn-link" id="btn-resend">Reenviar código</button>
        </form>
      </div>

    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
