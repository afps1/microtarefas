<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Microtarefas — Painel</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="/app/manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Microtarefas" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.svg" />
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

  <header class="app-header">
    <h1>Microtarefas</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="runner-name"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>

  <main class="app-body">
    <div id="tasks-list"></div>

    <!-- Chat fixo — nunca re-renderizado pelo polling de tarefas -->
    <div id="chat-container" style="display:none;">
      <div class="chat-fullscreen">
        <div class="chat-topbar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          Chat com o morador
        </div>
        <div id="chat-actions" class="chat-actions"></div>
        <div class="chat-messages" id="chat-msgs"></div>
        <div class="chat-input-row">
          <label class="chat-icon-btn" for="chat-file" title="Enviar foto">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
          </label>
          <input type="file" id="chat-file" accept="image/*" style="display:none" onchange="sendMedia(this)">
          <button class="chat-icon-btn" onclick="openQR()" title="Escanear QR Code Pix">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M21 16h-3v3M15 21v-3M15 16v-3h3M3 12h3M9 12h3M12 3v3M12 9v3M12 15v3M12 21v-3"/></svg>
          </button>
          <input class="chat-text" type="text" id="chat-text" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter') sendMessage()">
          <button class="chat-send" onclick="sendMessage()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Modal QR Scanner -->
    <div id="qr-modal" style="display:none;">
      <div class="qr-overlay">
        <div class="qr-modal-box">
          <div class="qr-modal-header">
            <span>Escanear QR Code Pix</span>
            <button class="qr-close" onclick="closeQR()">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
          <div class="qr-viewfinder">
            <video id="qr-video" autoplay playsinline muted></video>
            <canvas id="qr-canvas" style="display:none;"></canvas>
            <div class="qr-frame"></div>
          </div>
          <p class="qr-hint">Aponte para o QR Code Pix do estabelecimento</p>
        </div>
      </div>
    </div>
  </main>

  <script>
    const API = "https://microtarefas-production.up.railway.app";
    const token = localStorage.getItem("token");
    const runner = JSON.parse(localStorage.getItem("runner") || "null");

    if (!token) window.location.href = "login.html";

    const ratingStr = runner?.rating ? ` · ★ ${runner.rating}` : "";
    document.getElementById("runner-name").textContent = (runner?.name || "") + ratingStr;


    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    const statusLabel = {
      solicitado: "Solicitado",
      aceito: "Aceito",
      em_execucao: "Em execução",
      concluido: "Concluído",
      recebido: "Recebido",
    };

    const svgInbox = `<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>`;
    const svgPin = `<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

    function renderTasks(tasks) {
      const el = document.getElementById("tasks-list");

      if (!tasks.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div style="color:var(--muted)">${svgInbox}</div>
            <p>Nenhuma tarefa disponível no momento.</p>
          </div>`;
        return;
      }

      const hasActive = tasks.some(t => t.is_mine && (t.status === "aceito" || t.status === "em_execucao"));

      el.innerHTML = tasks.map(t => `
        <div class="task-card">
          <div class="task-type">${t.type}</div>
          <div class="task-meta">Ap. ${t.resident_apartment} · ${formatDate(t.created_at)}</div>
          <span class="task-status status-${t.status}">${statusLabel[t.status] || t.status}</span>
          ${t.description ? `<div class="task-observation">${svgPin}<span>${t.description}</span></div>` : ""}
          ${taskActions(t, hasActive)}
        </div>
      `).join("");
    }

    function taskActions(task, hasActive) {
      if (task.status === "solicitado") {
        if (hasActive) return `<p style="font-size:13px;color:var(--muted);margin-top:4px;">Conclua sua tarefa atual para aceitar esta.</p>`;
        return `<button class="btn btn-primary" onclick="updateTask(${task.id}, 'aceito')">Aceitar</button>`;
      }
      if (task.status === "aceito") {
        return `
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="updateTask(${task.id}, 'em_execucao')">Iniciar execução</button>
            <button class="btn btn-cancel" onclick="cancelTask(${task.id})">Cancelar serviço</button>
          </div>`;
      }
      if (task.status === "em_execucao") {
        return `
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="updateTask(${task.id}, 'concluido')">Marcar concluído</button>
            <button class="btn btn-cancel" onclick="cancelTask(${task.id})">Cancelar serviço</button>
          </div>`;
      }
      if (task.status === "concluido") {
        return `<button class="btn btn-primary" onclick="updateTask(${task.id}, 'recebido')">Recebi o pagamento</button>`;
      }
      return "";
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    // ── Polling de tarefas ──

    let lastTaskIds = new Set();
    let lastTasksHash = null;
    const POLL_INTERVAL = 8000;

    // AudioContext criado uma vez e desbloqueado no primeiro toque
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    document.addEventListener("click", () => getAudioCtx(), { once: true });
    document.addEventListener("touchstart", () => getAudioCtx(), { once: true });

    function vibrar() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function apitar() {
      try {
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch {}
    }

    function notificarNovaTarefa() {
      vibrar();
      apitar();
      document.title = "(!) Nova tarefa — Microtarefas";
      setTimeout(() => { document.title = "Microtarefas — Painel"; }, 4000);
    }

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks/my`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        const novos = data.filter(t => t.status === "solicitado" && !lastTaskIds.has(t.id));
        if (novos.length > 0 && lastTaskIds.size > 0) notificarNovaTarefa();
        lastTaskIds = new Set(data.map(t => t.id));

        const hash = data.map(t => `${t.id}:${t.status}`).join(",");
        if (hash !== lastTasksHash) {
          lastTasksHash = hash;
          renderTasks(data);
        }

        const execTask = data.find(t => t.status === "em_execucao" && t.is_mine);
        if (execTask) startChatPolling(execTask);
        else stopChatPolling();

      } catch {
        document.getElementById("tasks-list").innerHTML =
          `<div class="empty-state"><p>Erro ao carregar tarefas.</p></div>`;
      }
    }

    async function updateTask(taskId, newStatus) {
      try {
        const res = await fetch(`${API}/tasks/${taskId}/status`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ status: newStatus }),
        });
        if (res.ok) {
          lastTasksHash = null;
          loadTasks();
        } else {
          const d = await res.json();
          alert(d.detail || "Erro ao atualizar tarefa.");
          loadTasks();
        }
      } catch {
        alert("Erro ao atualizar tarefa.");
      }
    }

    // ── Chat ──

    let activeChatTaskId = null;
    let chatInterval = null;

    function startChatPolling(task) {
      document.getElementById("chat-container").style.display = "block";
      document.getElementById("chat-actions").innerHTML = `
        <div style="display:flex;gap:10px;${task.description ? 'margin-bottom:8px;' : ''}">
          <button class="btn btn-primary" onclick="updateTask(${task.id}, 'concluido')">Marcar concluído</button>
          <button class="btn btn-cancel" onclick="cancelTask(${task.id})">Cancelar serviço</button>
        </div>
        ${task.description ? `<div class="chat-observation">${svgPin}<span>${task.description}</span></div>` : ''}`;
      if (activeChatTaskId === task.id) return;
      activeChatTaskId = task.id;
      if (chatInterval) clearInterval(chatInterval);
      loadMessages();
      chatInterval = setInterval(loadMessages, 5000);
    }

    function stopChatPolling() {
      document.getElementById("chat-container").style.display = "none";
      if (chatInterval) clearInterval(chatInterval);
      chatInterval = null;
      activeChatTaskId = null;
    }

    async function loadMessages() {
      if (!activeChatTaskId) return;
      try {
        const res = await fetch(`${API}/tasks/${activeChatTaskId}/messages`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) return;
        const msgs = await res.json();
        const el = document.getElementById("chat-msgs");
        const atBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 40;
        el.innerHTML = msgs.length
          ? msgs.map(m => renderMsg(m)).join("")
          : `<div class="chat-empty">Nenhuma mensagem ainda.</div>`;
        if (atBottom) el.scrollTop = el.scrollHeight;
      } catch {}
    }

    function renderMsg(m) {
      const mine = m.sender === "parceiro";
      const time = new Date(m.created_at).toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      const bubble = m.type === "image"
        ? `<img src="${API}/tasks/media/${m.content}?token=${encodeURIComponent(token)}" class="chat-img" onclick="this.requestFullscreen?.()">`
        : `<span>${m.content}</span>`;
      return `<div class="chat-msg ${mine ? "chat-mine" : "chat-theirs"}">
        ${bubble}
        <div class="chat-time">${mine ? "" : "Morador · "}${time}</div>
      </div>`;
    }

    async function sendMessage() {
      const input = document.getElementById("chat-text");
      const content = input.value.trim();
      if (!content || !activeChatTaskId) return;
      input.value = "";
      try {
        await fetch(`${API}/tasks/${activeChatTaskId}/message`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ content }),
        });
        loadMessages();
      } catch { alert("Erro ao enviar mensagem."); }
    }

    async function sendMedia(input) {
      const file = input.files[0];
      if (!file || !activeChatTaskId) return;
      input.value = "";
      const formData = new FormData();
      formData.append("file", file);
      try {
        const res = await fetch(`${API}/tasks/${activeChatTaskId}/message/media`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: formData,
        });
        if (res.ok) loadMessages();
        else alert("Erro ao enviar imagem.");
      } catch { alert("Erro ao enviar imagem."); }
    }

    async function cancelTask(taskId) {
      if (!confirm("Tem certeza que deseja cancelar este serviço? O morador será avisado e a tarefa voltará para a fila.")) return;
      try {
        const res = await fetch(`${API}/tasks/${taskId}/cancel`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.ok) {
          lastTasksHash = null;
          loadTasks();
        } else {
          alert("Erro ao cancelar tarefa.");
        }
      } catch {
        alert("Erro ao cancelar tarefa.");
      }
    }

    // ── QR Scanner ──

    let qrStream = null;
    let qrInterval = null;

    async function openQR() {
      document.getElementById("qr-modal").style.display = "flex";
      try {
        qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        const video = document.getElementById("qr-video");
        video.srcObject = qrStream;
        qrInterval = setInterval(scanQR, 250);
      } catch {
        alert("Não foi possível acessar a câmera.");
        closeQR();
      }
    }

    function closeQR() {
      document.getElementById("qr-modal").style.display = "none";
      if (qrStream) { qrStream.getTracks().forEach(t => t.stop()); qrStream = null; }
      if (qrInterval) { clearInterval(qrInterval); qrInterval = null; }
    }

    function scanQR() {
      const video = document.getElementById("qr-video");
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      const canvas = document.getElementById("qr-canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data.startsWith("00020")) {
        closeQR();
        sendPix(code.data);
      }
    }

    async function sendPix(payload) {
      if (!activeChatTaskId) return;
      try {
        const res = await fetch(`${API}/tasks/${activeChatTaskId}/pix`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
          body: JSON.stringify({ payload }),
        });
        if (res.ok) loadMessages();
        else alert("Erro ao enviar código Pix.");
      } catch { alert("Erro ao enviar código Pix."); }
    }

    loadTasks();
    setInterval(loadTasks, POLL_INTERVAL);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/app/sw.js").then(async (reg) => {
        if (!("PushManager" in window)) return;
        const permission = await Notification.requestPermission();
        if (permission !== "granted") return;
        try {
          const keyRes = await fetch(`${API}/tasks/push-vapid-key`);
          const { public_key } = await keyRes.json();
          if (!public_key) return;

          // Cancela subscription antiga (chave pode ter mudado)
          const existing = await reg.pushManager.getSubscription();
          if (existing) await existing.unsubscribe();

          const sub = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: _urlB64ToUint8Array(public_key),
          });
          await fetch(`${API}/tasks/me/push-subscription`, {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
            body: JSON.stringify(sub.toJSON()),
          });
        } catch (e) { console.warn("Push subscription failed:", e); }
      });
    }

    function _urlB64ToUint8Array(b64) {
      const pad = "=".repeat((4 - b64.length % 4) % 4);
      const raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }
  </script>
</body>
</html>
