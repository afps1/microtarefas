<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vem Aqui — Painel</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="app-header">
    <h1>Vem Aqui</h1>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="runner-name"></span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </header>

  <main class="app-body">
    <div class="section-title">Tarefas disponíveis</div>
    <div id="tasks-list"></div>
  </main>

  <script>
    const API = "https://microtarefas-production.up.railway.app";
    const token = localStorage.getItem("token");
    const runner = JSON.parse(localStorage.getItem("runner") || "null");

    if (!token) window.location.href = "login.html";

    document.getElementById("runner-name").textContent = runner?.name || "";

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    const statusLabel = {
      solicitado: "Solicitado",
      aceito: "Aceito",
      em_execucao: "Em execução",
      concluido: "Concluído",
      recebido: "Recebido",
    };

    function renderTasks(tasks) {
      const el = document.getElementById("tasks-list");

      if (!tasks.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div style="font-size:40px">📭</div>
            <p>Nenhuma tarefa disponível no momento.</p>
          </div>`;
        return;
      }

      el.innerHTML = tasks.map(t => `
        <div class="task-card">
          <div class="task-type">${t.type}</div>
          <div class="task-meta">Ap. ${t.resident_apartment} · ${formatDate(t.created_at)}</div>
          <span class="task-status status-${t.status}">${statusLabel[t.status] || t.status}</span>
          ${t.description ? `<div style="font-size:13px;color:#374151;margin-bottom:14px;">${t.description}</div>` : ""}
          ${taskActions(t)}
        </div>
      `).join("");
    }

    function taskActions(task) {
      if (task.status === "solicitado") {
        return `<button class="btn btn-primary" onclick="updateTask(${task.id}, 'aceito')">Aceitar</button>`;
      }
      if (task.status === "aceito") {
        return `
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="updateTask(${task.id}, 'em_execucao')">Iniciar execução</button>
            <button class="btn btn-cancel" onclick="cancelTask(${task.id})">Cancelar serviço</button>
          </div>`;
      }
      if (task.status === "em_execucao") {
        return `
          <div style="display:flex;gap:10px;">
            <button class="btn btn-primary" onclick="updateTask(${task.id}, 'concluido')">Marcar concluído</button>
            <button class="btn btn-cancel" onclick="cancelTask(${task.id})">Cancelar serviço</button>
          </div>`;
      }
      if (task.status === "concluido") {
        return `<button class="btn btn-primary" onclick="updateTask(${task.id}, 'recebido')">Recebi o pagamento</button>`;
      }
      return "";
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    let lastTaskCount = 0;
    let lastTaskIds = new Set();
    const POLL_INTERVAL = 8000; // 8 segundos

    function vibrar() {
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function apitar() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.6);
      } catch {}
    }

    function notificarNovaTarefa() {
      vibrar();
      apitar();
      document.title = "🔔 Nova tarefa! — Vem Aqui";
      setTimeout(() => { document.title = "Vem Aqui — Painel"; }, 4000);
    }

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks/my`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();

        // Detecta novas tarefas solicitadas
        const novos = data.filter(t => t.status === "solicitado" && !lastTaskIds.has(t.id));
        if (novos.length > 0 && lastTaskIds.size > 0) {
          notificarNovaTarefa();
        }
        lastTaskIds = new Set(data.map(t => t.id));

        renderTasks(data);
      } catch {
        document.getElementById("tasks-list").innerHTML =
          `<div class="empty-state"><p>Erro ao carregar tarefas.</p></div>`;
      }
    }

    async function updateTask(taskId, newStatus) {
      try {
        const res = await fetch(`${API}/tasks/${taskId}/status`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ status: newStatus }),
        });
        if (res.ok) loadTasks();
      } catch {
        alert("Erro ao atualizar tarefa.");
      }
    }

    async function cancelTask(taskId) {
      if (!confirm("Tem certeza que deseja cancelar este serviço? O morador será avisado e a tarefa voltará para a fila.")) return;
      try {
        const res = await fetch(`${API}/tasks/${taskId}/cancel`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
        });
        if (res.ok) loadTasks();
        else alert("Erro ao cancelar tarefa.");
      } catch {
        alert("Erro ao cancelar tarefa.");
      }
    }

    loadTasks();
    setInterval(loadTasks, POLL_INTERVAL);
  </script>
</body>
</html>
